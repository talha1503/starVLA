# @package _global_

defaults:
  - base
  - _self_

rl_games:
  model_alias: cosmo_predict_gr00t

model: cosmo_predict_gr00t

paths:
  base_model_dir: playground/Pretrained_models/nvidia/Cosmos-Predict2-2B-Video2World

base_model:
  repo_id: nvidia/Cosmos-Predict2-2B-Video2World

initialization:
  checkpoint_local_dir: playground/Pretrained_models/WM4A-CosmoPredict-GR00T-LIBERO-4in1
  checkpoint_hf_repo_id: StarVLA/WM4A-CosmoPredict-GR00T-LIBERO-4in1
  checkpoint_filename: checkpoints/steps_50000_pytorch_model.pt

framework:
  name: CosmoPredict2GR00T
  qwenvl:
    base_vlm: ${paths.base_model_dir}
  world_model:
    base_wm: ${paths.base_model_dir}
    extract_layers: [-1]
  action_model:
    action_model_type: DiT-B
    action_dim: 7
    action_env_dim: 2
    state_dim: 7
    action_horizon: 8
    future_action_window_size: 7
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    add_pos_embed: true
    max_seq_len: 1024
    hidden_size: 1024
    action_hidden_dim: 1024
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
      attention_head_dim: 64

datasets:
  vla_data:
    include_state: true
    observation_indices: [-3, -2, -1, 0]
    language_indices: [0]
    state_indices: [0]
    action_indices: [0, 1, 2, 3, 4, 5, 6, 7]
    pack_image_sequence: true
    image_sequence_length: 4
    context_images_column: observation.context_images
    per_device_batch_size: 1

trainer:
  learning_rate:
    base: 2.0e-06
    backbone: 2.0e-06
    action_model: 2.0e-06
