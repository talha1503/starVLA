# @package _global_

rl_games:
  model_alias: pi-0

framework:
  name: QwenPI
  action_model:
    action_model_type: LayerwiseFM
    action_dim: 32
    action_env_dim: 2
    state_dim: 7
    action_horizon: 16
    future_action_window_size: 15
    past_action_window_size: 0
    repeated_diffusion_steps: 2
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    add_pos_embed: true
    max_seq_len: 1024
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    diffusion_model_cfg:
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      positional_embeddings: null
      attention_head_dim: 64
      # QwenPI overwrites these from the loaded VLM at runtime. They still
      # need to exist here because the training config is strict/structured.
      num_layers: null
      input_embedding_dim: null
      cross_attention_dim: null
      num_attention_heads: null

trainer:
  learning_rate:
    base: 5.0e-06
    action_model: 5.0e-06
