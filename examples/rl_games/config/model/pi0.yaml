defaults:
  - base
  - _self_

# @package _global_

rl_games:
  model_alias: pi-0

model: pi0

paths:
  base_model_dir: playground/Pretrained_models/Qwen2.5-VL-3B-Instruct-Action

base_model:
  repo_id: StarVLA/Qwen2.5-VL-3B-Instruct-Action

initialization:
  checkpoint_local_dir: playground/Pretrained_models/Qwen-PI-Bridge-RT-1
  checkpoint_hf_repo_id: StarVLA/Qwen-PI-Bridge-RT-1
  checkpoint_filename: checkpoints/steps_30000_pytorch_model.pt

framework:
  name: QwenPI
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen2.5-VL-3B-Instruct-Action
  action_model:
    action_model_type: DiT-Qwen
    hidden_size: 1024
    action_dim: 7
    action_env_dim: 2
    state_dim: 7
    action_horizon: 16
    future_action_window_size: 15
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    add_pos_embed: true
    max_seq_len: 1024
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    action_hidden_dim: 2048
    diffusion_model_cfg:
      cross_attention_dim: 2048
      num_layers: 16
      output_dim: 1024
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      positional_embeddings: null
      attention_head_dim: 64

trainer:
  learning_rate:
    base: 5.0e-06
    action_model: 5.0e-06
