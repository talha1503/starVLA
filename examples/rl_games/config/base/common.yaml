# @package _global_

framework:
  qwenvl:
    base_vlm: ${paths.base_model_dir}
    attn_implementation: flash_attention_2
    flex_backend: triton
    enable_gradient_checkpointing: true
  action_model:
    state_dim: 1
    loss_type: l1
    action_horizon: 1
    future_action_window_size: 0
    past_action_window_size: 0
  kv_memory:
    enabled: false
    window: 4
    rollout_len: 8
    # Packed single-forward training (StreamingLLM-style sliding-window+sink mask
    # via FlexAttention) instead of the per-frame Python loop. Big-matmul, high GPU
    # util, and re-enables gradient checkpointing (use_cache no longer needed).
    # REQUIRES framework.qwenvl.attn_implementation=flex_attention (forward AND the
    # checkpointing recompute must stay on flex to consume the BlockMask). Eval
    # streaming also runs fine under flex. Leave false to use the legacy loop.
    packed_train: false

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    data_root_dir: playground/Datasets/rl_games
    data_mix: ${dataset.converted_name}
    eval_data_mix: null
    custom_mixtures_path: null
    action_type: discrete
    sequential_step_sampling: false
    eval_sequential_step_sampling: null
    num_workers: 8
    eval_num_workers: 8
    prefetch_factor: 4
    persistent_workers: true
    pin_memory: true
    shuffle: true
    action_balance:
      enabled: false
      strategy: balanced_epoch
      action_key: action_id
      target_flap_fraction: 0.30
      noop_id: 0
      flap_id: 1
    latency_curriculum:
      enabled: false
      strategy: exclusive
      latencies: null
      phase_steps: null
      phase_distributions: null
      new_latency_passes: 1.0
      replay_passes: 0.25
      target_total_passes: 2.0
      final_equalization: true
      step_budget_mode: auto
      eval_at_phase_end: false
      save_at_phase_end: false
      computed_plan: null
    per_device_batch_size: 4
    load_all_data_for_training: true
    num_obs_frames: 1
    image_mode: single
    prompt_mode: raw
    stitch_grid: [2, 2]
    obs_image_size: null
    video_backend: torchvision_av

dataset:
  source_hf: ""
  config_name: null
  source_subdir: null
  converted_name: flappy_train
  single_source_hf: ""
  mixed_source_hf: ""
  single_converted_name: flappy_train
  mixed_converted_name: flappy_mixed_latency_train
  single_latency_filter: null
  mixed_latency_filter: null
  force_download: false
  setup_force: false
  skip_verification: false
  verify_rows: 200
  max_episodes: null
  episodes_per_latency: null
  latency_filter: null
  debug_subset:
    enabled: false
    max_episodes: 5
    suffix: debug

base_model:
  repo_id: StarVLA/Qwen3-VL-4B-Instruct-Action

initialization:
  checkpoint_local_dir: null
  checkpoint_hf_repo_id: null
  checkpoint_filename: null

trainer:
  max_train_steps: 2000
  num_warmup_steps: 100
  save_interval: 100
  eval_interval: 100
  eval_num_batches: 100
  # Optional held-out eval budget per latency. When null, eval_num_batches is
  # used as one shared budget across all latencies.
  per_latency_eval_num_batches: null
  # Log task-specific control-critical precision/recall/F1 on the held-out val set.
  # Supported tasks: flappy, demon_attack, deadly_corridor.
  # Disabled by default because online rollout eval is the training-time signal.
  # Enable explicitly with trainer.eval_action_classification=true for offline checks.
  eval_action_classification: false
  # Optional separate interval for action classification metrics. When null,
  # action classification runs with eval_interval.
  eval_action_classification_interval: null
  # Temporal tolerance, in decision steps, for non-Flappy CC-F1 event matching.
  # Flappy always uses 0 so flap_f1 remains exact per-frame flap F1.
  cc_f1_tolerance: 1
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  # Freeze Qwen-VL visual tower, including its vision-to-language connector/merger.
  freeze_vit: false
  # Freeze tied token embedding / lm_head.
  freeze_tied_embedding: false
  # Inclusive LLM decoder layer range to freeze, e.g. [0, 27].
  freeze_llm_layers: []
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 1
  # use this for bottleneck profiling
  profile_timing:
    enabled: false
    log_interval: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  distributed_backend: deepspeed
  is_resume: false
  pretrained_checkpoint: null
  resume_step: 0
  reload_modules: null
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
    fused: true
  save_format: pt
