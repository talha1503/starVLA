defaults:
  - base: common
  - model: openvla
  - env: flappy
  - mode: single
  - checkpoint: default
  - _self_

hydra:
  run:
    dir: ${run_root_dir}/${run_id}/hydra
  job:
    chdir: false

# Canonical Hydra training schema. Experiment YAMLs should use these same
# field names for training config; run_experiment.py no longer translates
# legacy launcher aliases into different Hydra paths.
run_id: starvla_rl_games
run_root_dir: results/Checkpoints
output_dir: null
config_yaml: null
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_rl_games
is_debug: false
version_id: "0.21"

# Model/framework config. Model-specific config groups may override parts of
# this tree, and experiment YAMLs can override these exact paths.
framework:
  name: QwenOFT
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action
    attn_implementation: flash_attention_2
    enable_gradient_checkpointing: true
    lora:
      enabled: true
      r: 32
      alpha: 64
      dropout: 0.05
      target_modules: all-linear
      bias: none
  action_model:
    action_model_type: MLP
    action_dim: 2
    action_env_dim: 2
    state_dim: 1
    action_horizon: 1
    future_action_window_size: 0
    past_action_window_size: 0

# Training dataset config. per_device_batch_size is the micro batch size per
# process/device.
datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    data_root_dir: playground/Datasets/rl_games
    data_mix: flappy_train
    eval_data_mix: null
    action_type: discrete
    sequential_step_sampling: false
    per_device_batch_size: 4
    load_all_data_for_training: true
    obs_image_size: [84, 84]
    video_backend: torchvision_av

# Trainer loop, optimization, checkpoint-save, and dataloader-eval settings.
trainer:
  max_train_steps: 2000
  num_warmup_steps: 100
  save_interval: 100
  eval_interval: 100
  eval_num_batches: 20
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  distributed_backend: deepspeed
  is_resume: false
  pretrained_checkpoint: null
  resume_step: 0
  reload_modules: null
  # The RL-games trainer always builds torch.optim.AdamW; these are AdamW kwargs.
  optimizer:
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
    fused: false
  save_format: pt
