# @package _global_

defaults:
  - /train
  - override /model: openvla
  - override /env: deadly_corridor
  - override /init: bridge
  - override /mode: single
  - _self_

model: openvla
env: deadly_corridor
init: bridge
mode: single
run_id: deadly_corridor_fix_latency_2

paths:
  dataset_local_dir: data/jitter_destructiveness/deadly_corridor_fix_latency_2
  base_model_dir: playground/Pretrained_models/Qwen3-VL-4B-Instruct

base_model:
  repo_id: Qwen/Qwen3-VL-4B-Instruct

initialization:
  checkpoint_local_dir: playground/Pretrained_models/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_hf_repo_id: StarVLA/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_filename: checkpoints/steps_5000_pytorch_model.pt

dataset:
  converted_name: deadly_corridor_train

datasets:
  vla_data:
    include_state: true
    data_mix: deadly_corridor_train__bridge
    eval_data_mix: deadly_corridor_train__bridge__val
    per_device_batch_size: 32

framework:
  action_model:
    action_dim: 7
    action_env_dim: 7
    state_dim: 7
    loss_type: discrete_ce

trainer:
  max_train_steps: 500
  num_warmup_steps: 100
  save_interval: 50
  eval_interval: 100
  eval_num_batches: 20
  gradient_accumulation_steps: 16
  distributed_backend: none

checkpoint:
  save_best_model: true
  local:
    keep_last_n: 1

rl_games:
  task: deadly_corridor
  initialization_mode: bridge
  action_carrier: bridge
  env_eval:
    latency:
      prompt_map_path: ${paths.dataset_local_dir}/${dataset.converted_name}__bridge/latency_prompt_map.json
    mid_train:
      enabled: true
      interval_steps: 50
      latencies: [2]
      num_episodes: 5
      max_steps_per_episode: 3600
    post_train:
      enabled: true
      latencies: [0, 2, 4, 6, 8]
      num_episodes: 5
      max_steps_per_episode: 3600
