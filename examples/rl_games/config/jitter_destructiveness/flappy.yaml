# @package _global_

defaults:
  - /train
  - override /model: openvla
  - override /env: flappy
  - override /init: bridge
  - override /mode: single
  - _self_

model: openvla
env: flappy
init: bridge
mode: single
run_id: flappy_fix_latency_2_200ep

paths:
  dataset_local_dir: data/jitter_destructiveness/flappy_fix_latency_2_200ep
  base_model_dir: playground/Pretrained_models/Qwen3-VL-4B-Instruct

base_model:
  repo_id: Qwen/Qwen3-VL-4B-Instruct

initialization:
  checkpoint_local_dir: playground/Pretrained_models/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_hf_repo_id: StarVLA/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_filename: checkpoints/steps_5000_pytorch_model.pt

dataset:
  converted_name: flappy_train

datasets:
  vla_data:
    include_state: true
    data_mix: flappy_train__bridge
    eval_data_mix: flappy_train__bridge__val
    per_device_batch_size: 32

framework:
  action_model:
    action_dim: 7
    action_env_dim: 2
    state_dim: 7
    loss_type: discrete_ce

trainer:
  max_train_steps: 5000
  num_warmup_steps: 100
  save_interval: 100
  eval_interval: 100
  eval_num_batches: 100
  eval_action_classification: true
  gradient_accumulation_steps: 4
  distributed_backend: none

checkpoint:
  save_best_model: false
  local:
    keep_last_n: 1

rl_games:
  task: flappy
  initialization_mode: bridge
  action_carrier: bridge
  env_eval:
    mid_train:
      enabled: false
    post_train:
      enabled: false
