# @package _global_

rl_games:
  env_eval:
    image_size: 224
    frameskip: 1
    seed: ${seed}
    fixed_episode_seeds: true
    latency_seed_stride: 0
    task_seed_stride: 0
    task_description: ""
    # Envs evaluated in parallel per rollout when eval_backend=latency_bench
    # (batched policy forward). 1 = sequential. VRAM grows ~linearly with this;
    # per-stage override allowed under mid_train/post_train. Set in the launch
    # script: rl_games.env_eval.eval_parallel_envs=8
    eval_parallel_envs: 5
