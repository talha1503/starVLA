workspace_dir: WORKSPACE_DIR

# Bash reads this block before Python starts.
conda:
  enabled: true
  env_name: starvla_rl_games_openvla

# Optional. Do not commit the real env file; put it in workspace_dir or export
# HF_TOKEN/WANDB_API_KEY in the shell before running.
auth:
  env_file: null
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY

# These choose the Hydra config groups under examples/rl_games/config.
config_name: train
model: openvla
env: flappy
mode: single
run_id: openvla_flappy_bridge_single
seed: 42

wandb:
  entity: your_wandb_entity
  project: starVLA_rl_games

# Relative paths below are resolved under workspace_dir unless the file already
# lives in the repo, like the accelerate config.
paths:
  run_root_dir: results/Checkpoints
  dataset_local_dir: playground/Datasets/rl_games
  dataset_cache_dir: null
  base_model_dir: playground/Pretrained_models/Qwen3-VL-4B-Instruct
  accelerate_config: starVLA/config/deepseeds/deepspeed_zero2.yaml

# Setup downloads this HF dataset if converted_name is missing or setup_force=true,
# then converts it into the StarVLA/LeRobot layout and writes dataset statistics.
dataset:
  source_hf: talha1503/flappy_bird_zero_latency_parquet
  converted_name: flappy_train
  force_download: false
  setup_force: false
  verify_rows: 200
  max_episodes: null
  debug_subset:
    enabled: false
    max_episodes: 5
    suffix: debug

# Bridge mode starts from a released Bridge/RT-1 StarVLA checkpoint.
initialization:
  checkpoint_local_dir: playground/Pretrained_models/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_hf_repo_id: StarVLA/Qwen3VL-OFT-Bridge-RT-1
  checkpoint_filename: checkpoints/steps_5000_pytorch_model.pt

# Setup downloads this model into paths.base_model_dir if it is missing.
base_model:
  repo_id: Qwen/Qwen3-VL-4B-Instruct

# Setup first checks local checkpoints under:
#   workspace_dir / paths.run_root_dir / run_id / checkpoints
# If checkpoint.load is auto/hf and checkpoint.hf_repo_id is set, it can also
# pull the latest checkpoint from Hugging Face. checkpoint.sync_repo_id is only
# the upload destination for newly saved checkpoints when sync_enabled=true.
checkpoint:
  load: auto
  hf_repo_id: talha1503/openvla_flappy_bridge_zero_latency_exp1
  sync_enabled: true
  sync_repo_id: talha1503/openvla_flappy_bridge_zero_latency_exp1
  hf_keep_last_n: 0
  local_keep_last_n: 3

launch:
  use_accelerate: true
  gpus: null
  num_processes: 1

# Training/data-loader knobs forwarded into StarVLA's Hydra config.
train_data:
  include_state: false
  action_type: discrete
  sequential_step_sampling: false
  load_all_data_for_training: true
  obs_image_size: [84, 84]
  video_backend: torchvision_av

framework:
  action_model:
    action_dim: 7
    action_env_dim: 2
    state_dim: 1
    loss_type: discrete_ce

trainer:
  max_train_steps: 5000
  num_warmup_steps: 0
  save_interval: 1000
  eval_interval: 500
  eval_num_batches: 20
  logging_frequency: 1
  gradient_accumulation_steps: 16
  batch_size: 16
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  gradient_clipping: 1.0
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
  save_format: pt

rl_games:
  task: flappy
  model_alias: openvla
  initialization_mode: bridge
  action_carrier: bridge
  task_description: ""
  frameskip: 1
  image_size: 84

  # Used as the default prompt map for all eval stages.
  latency_prompt_map_path: null

  # Global switch for environment rollout eval.
  env_eval_enabled: true

  # Runs during training. Keep this smaller if eval is expensive.
  mid_train_eval:
    enabled: true
    interval_steps: 500
    latencies: [0]
    num_episodes: 20
    max_steps_per_episode: 3600

  # Runs once after training completes. This can be larger/more exhaustive.
  post_train_eval:
    enabled: true
    latencies: [0,1,2,3,4,5,6,7]
    num_episodes: 20
    max_steps_per_episode: 3600

  latency_mode: single
  latencies: [0]