# Workspace root for relative assets and outputs. Use an absolute path or set
# WORKSPACE_DIR in the shell.
workspace_dir: /home/lixinyuan/latency-sensitive-bench

# Launcher-only: run_experiment.sh reads this before Python starts.
conda:
  enabled: true
  env_name: starvla_rl_games_openvla

# Launcher-only: optional auth env indirection. Do not commit real tokens.
auth:
  env_file: null
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY

# Hydra entrypoint and config groups under examples/rl_games/config.
config_name: train
model: openvla
env: deadly_corridor
mode: single
run_id: openvla_deadly_corridor_single
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_rl_games

# Launcher-only paths. Training paths live in the Hydra-aligned sections below.
paths:
  dataset_cache_dir: outputs/hf_datasets_cache
  accelerate_config: starVLA/config/deepseeds/deepspeed_zero2.yaml

# Setup-only dataset source/conversion controls.
dataset:
  source_hf: /home/lixinyuan/latency-sensitive-bench/outputs/deadly_corridor_fixed_2_latency
  latency_raw_frame_filter: null
  force_download: false
  setup_force: false
  verify_rows: 200
  max_episodes: null
  debug_subset:
    enabled: false
    max_episodes: 5
    suffix: debug

# Hydra training dataset config. These names match config/train.yaml exactly.
datasets:
  vla_data:
    data_root_dir: outputs/deadly_corridor_fixed_2_latency
    data_mix: deadly_corridor_train
    action_type: discrete
    sequential_step_sampling: false
    load_all_data_for_training: true
    obs_image_size: [84, 84]
    video_backend: torchvision_av
    per_device_batch_size: 32

# Setup-only base model repo. The local path is framework.qwenvl.base_vlm below.
base_model:
  repo_id: StarVLA/Qwen3-VL-4B-Instruct-Action

# Resume/sync policy. Nested keys match the Hydra checkpoint config.
checkpoint:
  load: auto
  hf_repo_id: null
  sync:
    enabled: false
    keep_last_n: 0
  local:
    keep_last_n: 3

# Launcher process controls.
launch:
  use_accelerate: true
  gpus: null
  num_processes: 1

# Hydra model config. run_experiment.py resolves base_vlm under workspace_dir.
framework:
  qwenvl:
    base_vlm: playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action

# Hydra trainer config.
trainer:
  max_train_steps: 2000
  num_warmup_steps: 100
  save_interval: 100
  eval_interval: 100
  eval_num_batches: 20
  logging_frequency: 10
  gradient_accumulation_steps: 1
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  gradient_clipping: 1.0
  save_format: pt

# Hydra RL-games eval config. env_eval controls real environment rollouts,
# separately from trainer.eval_interval loss evaluation.
rl_games:
  task: deadly_corridor
  model_alias: openvla
  env_eval:
    frameskip: 4
    image_size: 84
    deadly:
      action_layout: multibinary_7
    enabled: false
    latency:
      mode: single
      values: [0]
    mid_train:
      enabled: false
      interval_steps: 100
      latencies: [0]
      num_episodes: 5
      max_steps_per_episode: 2000
    post_train:
      enabled: false
      latencies: [0]
      num_episodes: 5
      max_steps_per_episode: 2000
