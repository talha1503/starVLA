# Workspace root for relative assets and outputs. Use an absolute path or set
# WORKSPACE_DIR in the shell.
workspace_dir: WORKSPACE_DIR

# Launcher-only: run_experiment.sh reads this before Python starts.
conda:
  enabled: true
  env_name: starvla_rl_games_pi0

# Launcher-only: optional auth env indirection. Do not commit real tokens.
auth:
  env_file: null
  hf_token_env: HF_TOKEN
  wandb_api_key_env: WANDB_API_KEY

# Hydra entrypoint and config groups under examples/rl_games/config.
config_name: train
model: pi0
env: flappy
mode: single
run_id: pi0_flappy_single
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_rl_games

# Launcher-only paths. Training paths live in the Hydra-aligned sections below.
paths:
  accelerate_config: starVLA/config/deepseeds/deepspeed_zero2.yaml

# Setup-only converted dataset controls.
dataset:
  converted_hf: null
  force_download: false

# Hydra training dataset config. These names match config/train.yaml exactly.
datasets:
  vla_data:
    data_root_dir: playground/Datasets/rl_games
    data_mix: flappy_train
    include_state: true
    action_type: discrete
    sequential_step_sampling: false
    load_all_data_for_training: true
    obs_image_size: [84, 84]
    video_backend: torchvision_av
    per_device_batch_size: 1

# Setup-only base model repo. The local path is framework.qwenvl.base_vlm below.
base_model:
  repo_id: StarVLA/Qwen3-VL-4B-Instruct-Action

# Resume/sync policy. Nested keys match the Hydra checkpoint config.
checkpoint:
  load: auto
  hf_repo_id: null
  sync:
    enabled: false
    keep_last_n: 0
  local:
    keep_last_n: 3

# Launcher process controls.
launch:
  use_accelerate: true
  gpus: null
  num_processes: 1

# Hydra model config. QwenPI uses a diffusion/action chunk head, so its
# action_model block differs from OpenVLA.
framework:
  name: QwenPI
  qwenvl:
    attn_implementation: flash_attention_2
    enable_gradient_checkpointing: true
    base_vlm: playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action
  action_model:
    action_model_type: LayerwiseFM
    action_dim: 2
    action_env_dim: 2
    state_dim: 1
    action_horizon: 1
    future_action_window_size: 0
    past_action_window_size: 0
    repeated_diffusion_steps: 2
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    add_pos_embed: true
    max_seq_len: 1024
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    diffusion_model_cfg:
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      positional_embeddings: null
      attention_head_dim: 64

# Hydra trainer config.
trainer:
  max_train_steps: 2000
  num_warmup_steps: 100
  save_interval: 100
  eval_interval: 100
  eval_num_batches: 20
  logging_frequency: 10
  gradient_accumulation_steps: 1
  learning_rate:
    base: 5.0e-06
    qwen_vl_interface: 5.0e-06
    action_model: 5.0e-06
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  gradient_clipping: 1.0
  save_format: pt

# Hydra RL-games eval config. env_eval controls real environment rollouts,
# separately from trainer.eval_interval loss evaluation.
rl_games:
  task: flappy
  model_alias: pi-0
  env_eval:
    frameskip: 1
    image_size: 84
    enabled: true
    latency:
      mode: single
      values: [0]
    mid_train:
      enabled: true
      interval_steps: 100
      latencies: [0]
      num_episodes: 5
      max_steps_per_episode: 2000
    post_train:
      enabled: true
      latencies: [0]
      num_episodes: 5
      max_steps_per_episode: 2000
